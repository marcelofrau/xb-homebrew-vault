name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish Windows x64
        shell: pwsh
        run: |
          $version = "$env:GITHUB_REF_NAME" -replace '^v', ''
          dotnet publish XBVault/XBVault.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishReadyToRun=true `
            -p:Version=$version `
            -o publish/

      - name: Create ZIP
        shell: pwsh
        run: |
          $version = "$env:GITHUB_REF_NAME" -replace '^v', ''
          $zipName = "XBVault-v$version-win-x64.zip"
          Compress-Archive -Path publish/* -DestinationPath $zipName -CompressionLevel Optimal
          Add-Content -Path $env:GITHUB_ENV -Value "ZIP_NAME=$zipName"

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "$env:GITHUB_REF_NAME"
          $zip = "$env:ZIP_NAME"
          gh release upload $tag $zip --clobber 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "Auto-built release for $tag"
            gh release upload $tag $zip --clobber
          }
