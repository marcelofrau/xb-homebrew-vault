name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore XBVault/XBVault.csproj

    - name: Build
      run: dotnet build XBVault/XBVault.csproj -c Release --no-restore

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: XBVault-build-${{ matrix.os }}
        path: XBVault/bin/Release/net8.0/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            script: powershell -File build/build-release.ps1 -Version $VERSION -Installer
          - os: windows-latest
            rid: win-arm64
            script: powershell -File build/build-release.ps1 -Version $VERSION -Arch arm64
          - os: ubuntu-latest
            rid: linux-x64
            script: bash build/build-release.sh $VERSION x64
          - os: macos-latest
            rid: osx-x64
            script: bash build/build-release.sh $VERSION x64
          - os: macos-latest
            rid: osx-arm64
            script: bash build/build-release.sh $VERSION arm64
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Install Inno Setup (Windows)
      if: matrix.os == 'windows-latest'
      run: choco install innosetup --no-progress

    - name: Build release
      shell: bash
      env:
        VERSION: ${{ github.ref_name }}
      run: ${{ matrix.script }}

    - uses: actions/upload-artifact@v4
      with:
        name: release-${{ matrix.rid }}
        path: dist/XBVault-*

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: actions/download-artifact@v4
      with:
        pattern: release-*
        merge-multiple: true
        path: dist

    - name: Display structure
      run: ls -lh dist/

    - name: Generate checksums body
      run: |
        echo "" > release-body.md
        echo "---" >> release-body.md
        echo "" >> release-body.md
        echo "## ✅ SHA256 Checksums" >> release-body.md
        echo "" >> release-body.md
        echo '```' >> release-body.md
        (cd dist && sha256sum *) >> release-body.md
        echo '```' >> release-body.md
        echo "" >> release-body.md
        echo "VirusTotal scan in progress — results appended automatically." >> release-body.md

    - name: Update Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        body_path: release-body.md
        append_body: true
        fail_on_unmatched_files: false

    - name: VirusTotal Scan
      uses: cssnr/virustotal-action@v1
      continue-on-error: true
      with:
        vt_api_key: ${{ secrets.VT_API_KEY }}
        file_globs: dist/*
        sha256: true
        update_release: true
        release_id: ${{ steps.create_release.outputs.id }}
        release_heading: '### 🔬 VirusTotal'
        collapsed: true
