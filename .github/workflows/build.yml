name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore XBVault/XBVault.csproj

    - name: Build
      run: dotnet build XBVault/XBVault.csproj -c Release --no-restore

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: XBVault-build-${{ matrix.os }}
        path: XBVault/bin/Release/net8.0/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish win-x64
      shell: pwsh
      run: |
        $ver = "${{ github.ref_name }}" -replace '^v', ''
        dotnet publish XBVault/XBVault.csproj -c Release -r win-x64 --self-contained true -p:PublishReadyToRun=true -p:Version=$ver -o publish-win

    - name: Package win-x64
      shell: pwsh
      run: |
        $ver = "${{ github.ref_name }}" -replace '^v', ''
        Compress-Archive -Path publish-win/* -DestinationPath "XBVault-$ver-win-x64.zip"

    - name: Publish linux-x64
      shell: pwsh
      run: |
        $ver = "${{ github.ref_name }}" -replace '^v', ''
        dotnet publish XBVault/XBVault.csproj -c Release -r linux-x64 --self-contained true -p:PublishReadyToRun=false -p:Version=$ver -o publish-linux

    - name: Package linux-x64
      shell: pwsh
      run: |
        $ver = "${{ github.ref_name }}" -replace '^v', ''
        Compress-Archive -Path publish-linux/* -DestinationPath "XBVault-$ver-linux-x64.zip"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          XBVault-*-win-x64.zip
          XBVault-*-linux-x64.zip
        generate_release_notes: false
