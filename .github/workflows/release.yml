name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            script: powershell -File build/build-release.ps1 -Version $VERSION -Installer
            artifact-pattern: dist/XBVault-*

          - os: windows-latest
            rid: win-arm64
            script: powershell -File build/build-release.ps1 -Version $VERSION -Arch arm64
            artifact-pattern: dist/XBVault-*.zip

          - os: ubuntu-latest
            rid: linux-x64
            script: bash build/build-release.sh $VERSION x64
            artifact-pattern: dist/XBVault-*.zip

          - os: macos-13
            rid: osx-x64
            script: bash build/build-release.sh $VERSION x64
            artifact-pattern: dist/XBVault-*.zip

          - os: macos-latest
            rid: osx-arm64
            script: bash build/build-release.sh $VERSION arm64
            artifact-pattern: dist/XBVault-*.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Inno Setup (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install innosetup --no-progress

      - name: Build release
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: ${{ matrix.script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: dist/XBVault-*

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Display structure
        run: ls -lh dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: false
