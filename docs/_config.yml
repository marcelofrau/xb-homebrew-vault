title: XB Homebrew Vault
description: Desktop manager for Xbox Dev Mode homebrew — browse, install, and manage emulators and apps via the Xbox Device Portal API.
theme: jekyll-theme-cayman

url: "https://xbvault.pages.dev"
baseurl: "/xb-homebrew-vault"

github_username: marcelofrau
repository: marcelofrau/xb-homebrew-vault
app_icon: /assets/images/about-appicon-80.png

show_downloads: true

# Navigation pages (Cayman shows these in the header)
header_pages:
  - index.md
  - architecture.md
  - api.md
  - roadmap.md
  - tech-debt.md

# Markdown extensions
markdown: kramdown
kramdown:
  input: GFM

# Syntax highlighting
highlighter: rouge

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true
